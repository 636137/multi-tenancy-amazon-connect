<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElevenLabs TTS Test</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
        }
        h1 { color: #00d4aa; text-align: center; }
        .card {
            background: #16213e;
            border-radius: 12px;
            padding: 24px;
            margin: 20px 0;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 12px;
            border: 2px solid #0f3460;
            border-radius: 8px;
            background: #1a1a2e;
            color: #eee;
            font-size: 16px;
            resize: vertical;
        }
        textarea:focus { border-color: #00d4aa; outline: none; }
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #0f3460;
            border-radius: 8px;
            background: #1a1a2e;
            color: #eee;
            font-size: 16px;
            margin: 10px 0;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00d4aa, #00a885);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 0;
        }
        button:hover { transform: scale(1.02); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .status {
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            text-align: center;
        }
        .status.loading { background: #0f3460; }
        .status.success { background: #00d4aa33; color: #00d4aa; }
        .status.error { background: #ff6b6b33; color: #ff6b6b; }
        audio { width: 100%; margin: 10px 0; }
        .quick-tests {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }
        .quick-btn {
            padding: 10px;
            background: #0f3460;
            font-size: 14px;
            color: #eee;
        }
        .quick-btn:hover { background: #1a4a7a; }
        label { display: block; margin: 10px 0 5px; color: #888; }
    </style>
</head>
<body>
    <h1>🔊 ElevenLabs TTS Test</h1>
    
    <div class="card">
        <label>Text to speak:</label>
        <textarea id="text" placeholder="Enter text to convert to speech...">Hello! This is a test of ElevenLabs text to speech integration. The audio quality should be natural and clear.</textarea>
        
        <label>Quick test phrases:</label>
        <div class="quick-tests">
            <button class="quick-btn" onclick="setText('Welcome to Johns Hopkins IT Help Desk. How can I assist you today?')">JHU Greeting</button>
            <button class="quick-btn" onclick="setText('Your ticket has been created. Reference number: HD-2024-0542.')">Ticket Created</button>
            <button class="quick-btn" onclick="setText('I understand you are having trouble with your password. Let me help you reset it.')">Password Help</button>
            <button class="quick-btn" onclick="setText('Is there anything else I can help you with today?')">Closing</button>
        </div>
        
        <label>Voice:</label>
        <select id="voice">
            <option value="21m00Tcm4TlvDq8ikWAM">Rachel (American Female)</option>
            <option value="EXAVITQu4vr4xnSDxMaL">Bella (American Female)</option>
            <option value="ErXwobaYiN019PkySvjV">Antoni (American Male)</option>
            <option value="VR6AewLTigWG4xSOukaG">Arnold (American Male)</option>
            <option value="pNInz6obpgDQGcFmaJgB">Adam (American Male)</option>
            <option value="yoZ06aMxZJJ28mfd3POQ">Sam (American Male)</option>
            <option value="jBpfuIE2acCO8z3wKNLl">Gigi (American Female)</option>
            <option value="oWAxZDx7w5VEj9dCyTzz">Grace (American Female)</option>
        </select>
        
        <label>Model:</label>
        <select id="model">
            <option value="eleven_multilingual_v2">Multilingual v2 (Best quality)</option>
            <option value="eleven_turbo_v2_5">Turbo v2.5 (Fast)</option>
            <option value="eleven_flash_v2_5">Flash v2.5 (Fastest)</option>
        </select>
        
        <button id="generateBtn" onclick="generateSpeech()">🔊 Generate Speech</button>
        
        <div id="status" class="status" style="display:none;"></div>
        <audio id="audioPlayer" controls style="display:none;"></audio>
    </div>
    
    <div class="card" style="font-size: 14px; color: #888;">
        <strong>API Info:</strong><br>
        Endpoint: POST /v1/text-to-speech/{voice_id}<br>
        Returns: audio/mpeg stream
    </div>

    <script>
        const API_KEY = 'sk_3aee547717f8fac63ffa4c8417a3b67685c7f927f65c61e9';
        
        function setText(text) {
            document.getElementById('text').value = text;
        }
        
        function showStatus(msg, type) {
            const status = document.getElementById('status');
            status.textContent = msg;
            status.className = 'status ' + type;
            status.style.display = 'block';
        }
        
        async function generateSpeech() {
            const text = document.getElementById('text').value.trim();
            const voiceId = document.getElementById('voice').value;
            const modelId = document.getElementById('model').value;
            const btn = document.getElementById('generateBtn');
            const audio = document.getElementById('audioPlayer');
            
            if (!text) {
                showStatus('Please enter some text', 'error');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = '⏳ Generating...';
            showStatus('Calling ElevenLabs API...', 'loading');
            audio.style.display = 'none';
            
            try {
                const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
                    method: 'POST',
                    headers: {
                        'xi-api-key': API_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        text: text,
                        model_id: modelId,
                        voice_settings: {
                            stability: 0.5,
                            similarity_boost: 0.75
                        }
                    })
                });
                
                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail?.message || `API Error: ${response.status}`);
                }
                
                const audioBlob = await response.blob();
                const audioUrl = URL.createObjectURL(audioBlob);
                
                audio.src = audioUrl;
                audio.style.display = 'block';
                audio.play();
                
                showStatus(`✅ Generated! (${(audioBlob.size / 1024).toFixed(1)} KB)`, 'success');
                
            } catch (error) {
                console.error('TTS Error:', error);
                showStatus(`❌ ${error.message}`, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '🔊 Generate Speech';
            }
        }
    </script>
</body>
</html>
