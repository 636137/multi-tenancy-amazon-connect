# Census Survey Voice Test - Happy Path
#
# Tests the Amazon Connect Census Survey bot with a cooperative caller
# who completes the survey successfully.
#
# Target: The Amazon Connect phone number for the Census Survey

name: "Census Survey - Happy Path"
version: "1.0.0"
description: |
  Complete happy path test of the Census Survey IVR/Lex bot.
  The AI caller will navigate through all survey questions and
  provide valid responses to complete the survey.
author: "Voice Test Agent"
created: "2026-03-03"
tags:
  - census-survey
  - happy-path
  - lex-bot
  - connect

# =============================================================================
# TARGET - The Amazon Connect number to call
# =============================================================================
target:
  # Phone number can be overridden via CLI
  phone_number: "${CONNECT_PHONE_NUMBER}"
  timeout_seconds: 180
  max_duration_seconds: 300
  
  recording:
    enabled: true
    format: "wav"
    channels: 2

# =============================================================================
# AI CALLER PERSONA
# =============================================================================
persona:
  name: "Cooperative Survey Participant"
  
  attributes:
    speaking_rate: "normal"
    patience: "patient"
    clarity: "clear"
    language: "en-US"
    voice_gender: "female"
  
  background: |
    You are a resident who received a call from the Census Bureau.
    You are willing to participate in the survey and provide honest answers.
    You speak clearly and directly. When asked questions, give concise answers.
    
    Your demographic profile for this test:
    - Language preference: English
    - Employment status: Employed
    - Age range: 35-44
    - Housing type: Own your home
    
    Remember: You are on a phone call. Keep responses brief (1-3 sentences max).
    Answer questions directly without extra commentary.
  
  behaviors:
    asks_clarification: false
    interrupts: false
    makes_mistakes: false

# =============================================================================
# TEST STEPS
# =============================================================================
steps:
  # --- GREETING PHASE ---
  - id: "wait_for_greeting"
    description: "Wait for the system to answer and greet the caller"
    action: "listen"
    expect:
      patterns:
        - "welcome"
        - "census"
        - "survey"
        - "thank you for calling"
      timeout_seconds: 20
    on_success: "acknowledge_greeting"
    on_failure: "retry_greeting"

  - id: "acknowledge_greeting"
    description: "Respond to the greeting"
    action: "speak"
    content:
      type: "ai_generated"
      intent: "Acknowledge the greeting naturally and indicate willingness to participate"
    wait_for_response: true
    next: "language_selection"

  # --- LANGUAGE SELECTION ---
  - id: "language_selection"
    description: "Wait for language selection prompt"
    action: "listen"
    expect:
      patterns:
        - "language"
        - "english"
        - "spanish"
        - "press|say"
      timeout_seconds: 15
    on_success: "select_english"

  - id: "select_english"
    description: "Select English as preferred language"
    action: "speak"
    content:
      type: "literal"
      text: "English"
    wait_for_response: true
    next: "wait_employment_question"

  # --- EMPLOYMENT QUESTION ---
  - id: "wait_employment_question"
    description: "Wait for employment status question"
    action: "listen"
    expect:
      patterns:
        - "employment"
        - "employed"
        - "work"
        - "occupation"
        - "job"
      timeout_seconds: 20
    on_success: "answer_employment"

  - id: "answer_employment"
    description: "Provide employment status"
    action: "speak"
    content:
      type: "literal"
      text: "I am employed full time"
    wait_for_response: true
    next: "wait_age_question"

  # --- AGE QUESTION ---
  - id: "wait_age_question"
    description: "Wait for age range question"
    action: "listen"
    expect:
      patterns:
        - "age"
        - "how old"
        - "years old"
        - "born"
      timeout_seconds: 20
    on_success: "answer_age"

  - id: "answer_age"
    description: "Provide age range"
    action: "speak"
    content:
      type: "literal"
      text: "35 to 44"
    wait_for_response: true
    next: "wait_housing_question"

  # --- HOUSING QUESTION ---
  - id: "wait_housing_question"
    description: "Wait for housing type question"
    action: "listen"
    expect:
      patterns:
        - "housing"
        - "rent"
        - "own"
        - "home"
        - "residence"
      timeout_seconds: 20
    on_success: "answer_housing"

  - id: "answer_housing"
    description: "Provide housing status"
    action: "speak"
    content:
      type: "literal"
      text: "I own my home"
    wait_for_response: true
    next: "wait_completion"

  # --- COMPLETION ---
  - id: "wait_completion"
    description: "Wait for survey completion message"
    action: "listen"
    expect:
      patterns:
        - "thank you"
        - "complete"
        - "finished"
        - "appreciate"
        - "recorded"
      timeout_seconds: 30
    on_success: "acknowledge_completion"

  - id: "acknowledge_completion"
    description: "Acknowledge completion and say goodbye"
    action: "speak"
    content:
      type: "ai_generated"
      intent: "Thank them and say a natural goodbye"
    wait_for_response: false
    next: "end_call"

  - id: "end_call"
    description: "End the call"
    action: "hangup"

# =============================================================================
# SUCCESS CRITERIA
# =============================================================================
success_criteria:
  required:
    - step: "select_english"
      status: "completed"
    - step: "answer_employment"
      status: "completed"
    - step: "answer_age"
      status: "completed"
    - step: "answer_housing"
      status: "completed"
    - step: "wait_completion"
      status: "completed"
  
  validation:
    intents_recognized:
      - "WelcomeIntent"
      - "LanguageSelection"
      - "CollectEmploymentStatus"
      - "CollectAgeRange"
      - "CollectHousingType"
    
    no_errors: true
    max_response_latency_ms: 5000

# =============================================================================
# ERROR HANDLING
# =============================================================================
error_handling:
  on_step_failure:
    action: "retry"
    max_retries: 2
    retry_delay_seconds: 2
  
  on_timeout:
    action: "speak"
    message: "I'm sorry, I didn't catch that"
  
  on_unexpected_prompt:
    use_ai: true
    ai_instruction: |
      You received an unexpected prompt from the system.
      Try to understand what's being asked and respond appropriately.
      If it seems like an error message, try to correct the situation.
      Stay in character as a cooperative survey participant.

# =============================================================================
# ASSERTIONS
# =============================================================================
assertions:
  - type: "transcript_contains"
    patterns:
      - "welcome|hello|census"
      - "survey"
      - "thank you"
    all_required: true
  
  - type: "transcript_excludes"
    patterns:
      - "error"
      - "sorry.*didn't understand"
      - "invalid"
      - "try again"
  
  - type: "duration"
    min_seconds: 60
    max_seconds: 240
  
  - type: "steps_completed"
    minimum_percentage: 80

# =============================================================================
# CLEANUP
# =============================================================================
cleanup:
  save_transcript: true
  save_recording: true
  generate_report: true
