# Census AI Agent Contact Flow - Automated Voice Test
#
# Instance: census-enumerator-9652
# Flow: Census AI Agent (4a2354b7-b179-400d-b175-82051ff9059d)
# Phone: +18332895330
#
# Tests Lambda-integrated AI responses and live agent transfer

name: "Census AI Agent - Conversation Test"
version: "1.0.0"
description: |
  Automated voice test for the Census AI Agent flow.
  This flow uses Lambda ($.External.response) for AI-generated responses.
  Tests both AI conversation and live agent transfer functionality.

author: "Copilot Agent Skills"
created: "2026-03-04"
tags:
  - census-enumerator
  - ai-agent
  - lambda-integration
  - nova-sonic

# =============================================================================
# TARGET CONFIGURATION
# =============================================================================
target:
  phone_number: "+18332895330"
  instance_id: "1d3555df-0f7a-4c78-9177-d42253597de2"
  flow_id: "4a2354b7-b179-400d-b175-82051ff9059d"
  flow_name: "Census AI Agent"
  
  timeout_seconds: 120
  max_duration_seconds: 180
  
  recording:
    enabled: true
    format: "wav"
    channels: 2
    save_path: "./voice_output/census_ai_agent/"

# =============================================================================
# NOVA SONIC AI CALLER CONFIGURATION
# =============================================================================
ai_caller:
  engine: "nova-sonic"
  model_id: "amazon.nova-sonic-v1:0"
  region: "us-east-1"
  
  voice:
    id: "matthew"
    gender: "male"
    accent: "us-english"
  
  audio:
    input_sample_rate: 16000
    output_sample_rate: 24000
    chunk_size_ms: 20
    silence_padding_seconds: 2.0

# =============================================================================
# CALLER PERSONA
# =============================================================================
persona:
  name: "Information Seeker"
  
  system_prompt: |
    You are calling the Census Bureau to ask questions about the census.
    You want to understand:
    1. Why the census is important
    2. How your data is protected
    3. What happens if you don't respond
    
    CRITICAL RULES:
    1. Ask ONE question at a time
    2. Keep questions SHORT (one sentence)
    3. Wait for the full response before asking next question
    4. After 2-3 questions, ask to speak to a live agent
    
    Start by greeting the system, then ask your first question.
    
  attributes:
    speaking_rate: "normal"
    patience: "patient"
    clarity: "clear"

# =============================================================================
# TEST STEPS
# =============================================================================
steps:
  - id: "wait_for_system"
    description: "Wait for AI agent to respond"
    action: "listen"
    expect:
      patterns:
        - "hi|hello|welcome|how can I help"
      timeout_seconds: 20
    on_match: "ask_question_1"
    on_timeout: "initiate_greeting"

  - id: "initiate_greeting"
    description: "Start conversation if system doesn't speak first"
    action: "speak"
    content:
      type: "literal"
      text: "Hello, I have some questions about the census."
    next: "listen_for_response_1"

  - id: "ask_question_1"
    description: "Ask first question"
    action: "speak"
    content:
      type: "ai_generated"
      intent: "Ask why the census is important"
    next: "listen_for_response_1"

  - id: "listen_for_response_1"
    description: "Wait for AI response"
    action: "listen"
    expect:
      patterns:
        - "census|important|data|count|population"
      timeout_seconds: 30
    on_match: "ask_question_2"
    on_timeout: "request_agent"

  - id: "ask_question_2"
    description: "Ask about data protection"
    action: "speak"
    content:
      type: "ai_generated"
      intent: "Ask how your personal data is protected"
    next: "listen_for_response_2"

  - id: "listen_for_response_2"
    description: "Wait for privacy explanation"
    action: "listen"
    expect:
      patterns:
        - "protect|private|confidential|secure|law"
      timeout_seconds: 30
    on_match: "request_agent"
    on_timeout: "request_agent"

  - id: "request_agent"
    description: "Request live agent transfer"
    action: "speak"
    content:
      type: "literal"
      text: "Can I speak to a live agent please?"
    next: "listen_for_transfer"

  - id: "listen_for_transfer"
    description: "Listen for transfer confirmation"
    action: "listen"
    expect:
      patterns:
        - "connect|transfer|hold|agent|moment"
      timeout_seconds: 20
    on_match: "verify_transfer"
    on_timeout: "call_end"

  - id: "verify_transfer"
    description: "Wait to verify transfer or queue"
    action: "wait"
    duration_seconds: 10
    next: "call_end"

  - id: "call_end"
    description: "End the test call"
    action: "hangup"
    reason: "test_completed"

# =============================================================================
# SUCCESS CRITERIA
# =============================================================================
success_criteria:
  required:
    - step: "listen_for_response_1"
      status: "matched"
  
  optional:
    - step: "listen_for_transfer"
      status: "matched"
  
  call_duration:
    min_seconds: 20
    max_seconds: 180

# =============================================================================
# ASSERTIONS
# =============================================================================
assertions:
  - type: "transcript_contains"
    description: "AI responded to questions"
    patterns:
      - "census|bureau|survey"
    required: true

  - type: "lambda_invoked"
    description: "Lambda was called for AI response"
    log_pattern: "$.External.response"
    required: false

  - type: "transcript_contains"
    description: "Transfer prompt played"
    patterns:
      - "connect|transfer|hold|agent"
    required: false

  - type: "transcript_excludes"
    description: "No errors"
    patterns:
      - "error|sorry.*problem|unable to"

# =============================================================================
# METADATA
# =============================================================================
metadata:
  connect_instance: "census-enumerator-9652"
  test_type: "integration"
  priority: "high"
  features_tested:
    - "lambda_integration"
    - "ai_responses"
    - "agent_transfer"
