# Census Survey - WebRTC Test Scenario
# This scenario tests the Census Survey Lex bot using WebRTC/chat mode
# which allows testing without phone numbers

name: Census Survey - WebRTC Test
description: >
  Tests the Census Survey bot using direct WebRTC connection to Amazon Connect.
  This mode uses chat messaging instead of voice, validating the Lex bot's
  text-based conversation flow.

version: "1.0"

# WebRTC-specific configuration
connection:
  mode: webrtc
  # These can be overridden via CLI or environment variables
  # instance_id: your-connect-instance-id
  # contact_flow_id: your-contact-flow-id

# AI caller persona for this test
persona:
  name: Cooperative Chat Participant
  
  attributes:
    language: English
    cooperation_level: high
    confusion_rate: 0.0
  
  behaviors:
    respond_promptly: true
    follow_instructions: true
  
  background: >
    A standard test participant completing the census survey.
    Provides clear, direct answers to survey questions.
    English speaker, employed, age 35-44, homeowner.
  
  survey_answers:
    language: English
    employment_status: Employed
    age_range: 35 to 44
    housing_type: Owner

# Test conversation steps
steps:
  - id: wait_for_greeting
    action: listen
    description: Wait for the bot's welcome message
    expect:
      timeout_seconds: 15
      patterns:
        - "welcome"
        - "survey"
        - "census"
        - "begin"
    
  - id: confirm_start
    action: speak
    description: Confirm ready to start the survey
    content:
      type: literal
      text: "Yes"
  
  - id: wait_for_language
    action: listen
    description: Wait for language selection prompt
    expect:
      timeout_seconds: 15
      patterns:
        - "language"
        - "English"
        - "Spanish"
  
  - id: select_language
    action: speak
    description: Select English language
    content:
      type: literal
      text: "English"
  
  - id: wait_for_employment
    action: listen
    description: Wait for employment status question
    expect:
      timeout_seconds: 15
      patterns:
        - "employ"
        - "work"
        - "job"
  
  - id: provide_employment
    action: speak
    description: Provide employment status
    content:
      type: literal
      text: "Employed"
  
  - id: wait_for_age
    action: listen
    description: Wait for age range question
    expect:
      timeout_seconds: 15
      patterns:
        - "age"
        - "old"
        - "years"
  
  - id: provide_age
    action: speak
    description: Provide age range
    content:
      type: literal
      text: "35 to 44"
  
  - id: wait_for_housing
    action: listen
    description: Wait for housing status question
    expect:
      timeout_seconds: 15
      patterns:
        - "hous"
        - "home"
        - "rent"
        - "own"
  
  - id: provide_housing
    action: speak
    description: Provide housing status
    content:
      type: literal
      text: "Owner"
  
  - id: wait_for_completion
    action: listen
    description: Wait for survey completion message
    expect:
      timeout_seconds: 15
      patterns:
        - "thank"
        - "complete"
        - "recorded"
        - "goodbye"

# Test assertions and success criteria
assertions:
  # Timing criteria
  timing:
    max_duration_seconds: 180  # 3 minutes max
    min_duration_seconds: 15   # At least 15 seconds
  
  # Conversation content checks
  transcript:
    must_contain:
      - "welcome"
      - "survey"
    must_not_contain:
      - "error"
      - "problem"
      - "cannot"
  
  # Step completion checks
  completion:
    required_steps:
      - wait_for_greeting
      - select_language
      - provide_employment
      - provide_age
      - provide_housing
      - wait_for_completion
