# Census Survey Test Scenario - AI Caller
#
# Uses AI Caller (Transcribe + Bedrock + Polly) for intelligent responses
# Provides natural voice generation with persona-driven responses

name: Census Survey - AI Caller
description: AI caller using Bedrock + Polly for natural voice responses

# Connection settings
connection:
  mode: webrtc  # Direct Connect chat for testing
  
# AI Caller voice configuration
voice:
  engine: ai-caller
  voice_id: Joanna  # Options: Joanna, Matthew, Salli, Joey, Ruth, Stephen
  sample_rate: 16000

# AI Caller persona - feeds into Nova Sonic system prompt
persona:
  name: Maria Garcia
  background: |
    You are Maria Garcia, a 38-year-old small business owner calling about a 
    census survey. You speak English as a second language but are fluent.
    You're busy but willing to participate. You own a retail store.
  attributes:
    speaking_rate: normal
    patience: moderate
    clarity: clear
    accent: slight_spanish
  behaviors:
    asks_clarification: true
    interrupts: false
    makes_mistakes: occasionally

# Test steps - AI generates natural responses
steps:
  - id: wait_greeting
    action: listen
    description: Wait for initial greeting from system
    
  - id: respond_english
    action: speak
    description: Confirm English preference
    content:
      type: ai
      intent: Agree to take the survey in English, sound friendly and willing
      fallback: "Yes, English please"
      
  - id: wait_employment_question
    action: listen
    description: Wait for employment status question
    
  - id: respond_employment
    action: speak
    description: Respond to employment status question
    content:
      type: ai
      intent: Answer that you're employed, mention being a small business owner
      fallback: "I'm employed"
      
  - id: wait_age_question
    action: listen
    description: Wait for age range question
    
  - id: respond_age
    action: speak
    description: Respond to age question
    content:
      type: ai
      intent: Answer age range 35 to 44
      fallback: "35 to 44"
      
  - id: wait_ownership_question
    action: listen
    description: Wait for home ownership question
    
  - id: respond_ownership
    action: speak
    description: Respond to home ownership question  
    content:
      type: ai
      intent: Answer that you own your home
      fallback: "I own my home"

  - id: wait_completion
    action: listen
    description: Wait for survey completion message

  - id: say_goodbye
    action: speak
    description: Thank the system and say goodbye
    content:
      type: ai
      intent: Thank them politely and say goodbye
      fallback: "Thank you, goodbye"
      
  - id: end_call
    action: hangup
    description: End the call

# Expected outcomes
expected_outcomes:
  - All questions answered successfully
  - Survey marked complete
  - Nova Sonic generates natural, contextual responses
  
# Validation rules
validation:
  rules:
    - type: response_received
      description: System responds to each input
    - type: ai_natural
      description: AI responses sound natural and contextual
