<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UK Government Multi-Tenant Connect Analysis</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'DM Sans', sans-serif;
      overflow-x: hidden;
      background: #0a0e1a;
      color: #e2e8f0;
    }
    
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap');
    
    body { font-family: 'DM Sans', -apple-system, sans-serif; }
    
    #root { width: 100%; min-height: 100vh; }
    
    /* Core layout */
    .nav { 
      position: sticky; top: 0; z-index: 100; 
      padding: 10px; 
      background: rgba(10, 14, 26, 0.95); 
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #1e293b;
      display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
    }
    
    .nav button {
      padding: 5px 12px; border-radius: 20px; border: 1px solid transparent;
      cursor: pointer; font-size: 11px; font-weight: 600;
      background: transparent; color: #64748b;
      transition: all 0.2s;
    }
    
    .nav button.active {
      background: rgba(0, 212, 255, 0.15);
      color: #00d4ff;
      outline: 1px solid rgba(0, 212, 255, 0.4);
    }
    
    .nav button:hover:not(.active) {
      color: #94a3b8;
    }
    
    .slide {
      max-width: 800px;
      margin: 0 auto;
      min-height: calc(100vh - 90px);
      padding: 40px 20px 60px;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.5s ease, transform 0.5s ease;
      pointer-events: none;
    }
    
    .slide.active {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    
    .controls {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      padding: 10px 20px; display: flex; justify-content: center; gap: 12px;
      background: rgba(10, 14, 26, 0.95); backdrop-filter: blur(12px);
      border-top: 1px solid #1e293b;
    }
    
    .controls button {
      padding: 8px 18px; border-radius: 8px; border: 1px solid #334155;
      background: #111827; color: #e2e8f0; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    
    .controls button:hover:not(:disabled) {
      background: #1a2235; border-color: #00d4ff;
    }
    
    .controls button:disabled {
      opacity: 0.4; cursor: default;
    }
    
    .dot-nav {
      display: flex; gap: 6px; align-items: center;
    }
    
    .dot {
      width: 6px; height: 6px; border-radius: 3px;
      background: #334155; cursor: pointer; transition: all 0.3s;
    }
    
    .dot.active {
      width: 18px; background: #00d4ff;
    }
    
    /* Slide content */
    .badge {
      display: inline-block; padding: 4px 12px;
      border-radius: 20px; font-size: 10px; font-weight: 700;
      letter-spacing: 0.8px;
      border: 1px solid;
      text-transform: uppercase;
    }
    
    .badge.warn { color: #ffb020; border-color: rgba(255, 176, 32, 0.4); background: rgba(255, 176, 32, 0.1); }
    .badge.danger { color: #ff3b5c; border-color: rgba(255, 59, 92, 0.4); background: rgba(255, 59, 92, 0.1); }
    .badge.success { color: #00e68a; border-color: rgba(0, 230, 138, 0.4); background: rgba(0, 230, 138, 0.1); }
    
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 48px; font-weight: 800; margin: 22px 0 18px;
      line-height: 1.1; letter-spacing: -1px;
    }
    
    h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 28px; font-weight: 800; margin: 14px 0 6px;
      line-height: 1.15; color: #e2e8f0;
    }
    
    .accent { color: #00d4ff; }
    .danger { color: #ff3b5c; }
    .success { color: #00e68a; }
    .warn { color: #ffb020; }
    
    p { font-size: 14px; line-height: 1.6; color: #94a3b8; margin: 12px 0; }
    
    p.sub { font-size: 13px; max-width: 560px; margin: 0 auto; }
    
    .text-center { text-align: center; }
    .mt-large { margin-top: 40px; }
    .mb-large { margin-bottom: 28px; }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 14px; margin: 20px 0;
    }
    
    .card {
      padding: 14px 16px; border-radius: 12px;
      border: 1px solid; background: rgba(0, 212, 255, 0.04);
      border-color: rgba(0, 212, 255, 0.3);
    }
    
    .card.success { background: rgba(0, 230, 138, 0.04); border-color: rgba(0, 230, 138, 0.3); }
    .card.danger { background: rgba(255, 59, 92, 0.04); border-color: rgba(255, 59, 92, 0.3); }
    .card.warn { background: rgba(255, 176, 32, 0.04); border-color: rgba(255, 176, 32, 0.3); }
    
    .card-title { font-weight: 600; font-size: 12px; margin-bottom: 4px; }
    .card-desc { font-size: 10px; color: #94a3b8; line-height: 1.4; }
    
    .error-message {
      padding: 20px; text-align: center; color: #94a3b8;
    }
    
    .fade-in { animation: fadeIn 0.5s ease-out; }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    strong { color: #e2e8f0; font-weight: 600; }
  </style>
</head>
<body>
  <nav class="nav" id="nav"></nav>
  <div id="root">
    <div class="error-message">
      <p style="margin-top: 100px;">Loading presentation...</p>
      <p style="font-size: 12px; opacity: 0.5;">If this message persists, JavaScript may be disabled or external CDN scripts failed to load.</p>
    </div>
  </div>
  <div class="controls" id="controls"></div>
  
  <script>
    // Pure vanilla JavaScript presentation (no React/Babel dependencies)
    
    const COLORS = {
      bg: "#0a0e1a",
      accent: "#00d4ff",
      danger: "#ff3b5c",
      success: "#00e68a",
      warn: "#ffb020",
    };
    
    const SLIDES_META = [
      { id: "hero", label: "Overview" },
      { id: "shared", label: "Shared Instance" },
      { id: "tagging", label: "Tag Reality" },
      { id: "domains", label: "Domain Locks" },
      { id: "gaps", label: "TBAC Gaps" },
      { id: "ai", label: "AI Bundle" },
      { id: "technical", label: "Technical Path" },
      { id: "business", label: "Business Decision" },
      { id: "faq", label: "FAQ" },
      { id: "solution", label: "Per-Agency" },
    ];
    
    class PresentationApp {
      constructor() {
        this.currentSlide = 0;
        this.init();
      }
      
      init() {
        this.renderNav();
        this.renderControls();
        this.renderSlides();
      }
      
      renderNav() {
        const nav = document.getElementById('nav');
        SLIDES_META.forEach((slide, idx) => {
          const btn = document.createElement('button');
          btn.className = idx === 0 ? 'active' : '';
          btn.textContent = `${String(idx + 1).padStart(2, '0')} ${slide.label}`;
          btn.onclick = () => this.goToSlide(idx);
          nav.appendChild(btn);
        });
      }
      
      renderControls() {
        const controls = document.getElementById('controls');
        
        // Prev button
        const prevBtn = document.createElement('button');
        prevBtn.textContent = '← Prev';
        prevBtn.onclick = () => this.goToSlide(Math.max(0, this.currentSlide - 1));
        prevBtn.id = 'prev-btn';
        controls.appendChild(prevBtn);
        
        // Dots
        const dotNav = document.createElement('div');
        dotNav.className = 'dot-nav';
        SLIDES_META.forEach((_, idx) => {
          const dot = document.createElement('div');
          dot.className = 'dot' + (idx === 0 ? ' active' : '');
          dot.onclick = () => this.goToSlide(idx);
          dotNav.appendChild(dot);
        });
        controls.appendChild(dotNav);
        
        // Next button
        const nextBtn = document.createElement('button');
        nextBtn.textContent = 'Next →';
        nextBtn.onclick = () => this.goToSlide(Math.min(SLIDES_META.length - 1, this.currentSlide + 1));
        nextBtn.id = 'next-btn';
        controls.appendChild(nextBtn);
      }
      
      renderSlides() {
        const root = document.getElementById('root');
        root.innerHTML = '';
        
        const slideContents = [
          this.createSlide1(),
          this.createSlide2(),
          this.createSlide3(),
          this.createSlide4(),
          this.createSlide5(),
          this.createSlide6(),
          this.createSlide7(),
          this.createSlide8(),
          this.createSlide9(),
          this.createSlide10(),
        ];
        
        slideContents.forEach((html, idx) => {
          const slide = document.createElement('div');
          slide.className = 'slide' + (idx === 0 ? ' active' : '');
          slide.innerHTML = html;
          root.appendChild(slide);
        });
      }
      
      goToSlide(idx) {
        // Update active slide
        document.querySelectorAll('.slide').forEach((el, i) => {
          el.classList.toggle('active', i === idx);
        });
        
        // Update nav buttons
        document.querySelectorAll('.nav button').forEach((el, i) => {
          el.classList.toggle('active', i === idx);
        });
        
        // Update dots
        document.querySelectorAll('.dot').forEach((el, i) => {
          el.classList.toggle('active', i === idx);
        });
        
        // Update control buttons
        document.getElementById('prev-btn').disabled = idx === 0;
        document.getElementById('next-btn').disabled = idx === SLIDES_META.length - 1;
        
        this.currentSlide = idx;
      }
      
      createSlide1() {
        return `
          <div class="text-center">
            <div class="badge warn">UK Government Risk Analysis</div>
            <h1>Multi-Tenant<br><span class="accent">Amazon Connect</span></h1>
            <p class="sub">How tag-based access controls, domain constraints, and the AI pricing toggle interact across sovereign government entities — and where isolation fails.</p>
            <p style="margin-top: 40px; font-size: 12px; opacity: 0.5;">4 independent data controllers · 1 shared instance · 6+ data repos · 1 domain each for Profiles, Cases, Q</p>
          </div>
        `;
      }
      
      createSlide2() {
        return `
          <div class="text-center mb-large">
            <div class="badge danger">Architecture Problem</div>
            <h2>One Instance,<br><span class="danger">Shared Everything</span></h2>
            <p class="sub">All tenants' data flows into common AWS resources with no native isolation</p>
          </div>
          <p><strong>Data flows to:</strong> S3 recordings · Contact Lens analytics · Kinesis CTR streams · DynamoDB config · CloudWatch logs · DynamoDB sessions</p>
          <div class="card danger">
            <div class="card-title danger">The Critical Gap</div>
            <div class="card-desc">Contacts cannot be tagged. S3 recordings land in shared buckets. Contact Lens dashboards ignore TBAC. One misconfigured security profile exposes all tenants' data.</div>
          </div>
        `;
      }
      
      createSlide3() {
        return `
          <div class="text-center mb-large">
            <div class="badge warn">Tagging Matrix</div>
            <h2>What Tags <span class="warn">Actually Control</span></h2>
            <p class="sub">TBAC covers operational resources but misses where tenant data lives</p>
          </div>
          <table style="width: 100%; font-size: 12px; text-align: left; margin: 20px 0;">
            <thead>
              <tr style="border-bottom: 1px solid #334155; padding-bottom: 8px;">
                <th style="padding: 8px; color: #94a3b8; font-weight: 400;">Resource</th>
                <th style="text-align: center; padding: 8px;">Taggable</th>
                <th style="text-align: center; padding: 8px;">TBAC</th>
              </tr>
            </thead>
            <tbody>
              <tr style="border-bottom: 1px solid #1e293b;"><td style="padding: 6px;">Agents / Queues / Profiles</td><td style="text-align: center;">✅</td><td style="text-align: center;">✅</td></tr>
              <tr style="border-bottom: 1px solid #1e293b; background: rgba(255, 59, 92, 0.05);"><td style="padding: 6px;"><strong>Contacts</strong></td><td style="text-align: center; color: #ff3b5c;">❌</td><td style="text-align: center; color: #ff3b5c;">❌</td></tr>
              <tr style="border-bottom: 1px solid #1e293b; background: rgba(255, 59, 92, 0.05);"><td style="padding: 6px;"><strong>Contact Lens</strong></td><td style="text-align: center; color: #ff3b5c;">✅</td><td style="text-align: center; color: #ff3b5c;">❌</td></tr>
              <tr style="border-bottom: 1px solid #1e293b;"><td style="padding: 6px;">S3 Recordings</td><td style="text-align: center;">❌</td><td style="text-align: center;">❌</td></tr>
              <tr><td style="padding: 6px;">CloudWatch Logs</td><td style="text-align: center;">❌</td><td style="text-align: center;">❌</td></tr>
            </tbody>
          </table>
        `;
      }
      
      createSlide4() {
        return `
          <div class="text-center mb-large">
            <div class="badge danger">1:1 Domain Locks</div>
            <h2>One Instance = <span class="danger">One Domain Each</span></h2>
            <p class="sub">Six critical services hard-locked to a single domain per instance</p>
          </div>
          <div style="background: rgba(251, 113, 133, 0.04); border: 1px solid rgba(251, 113, 133, 0.2); border-radius: 12px; padding: 14px; margin: 20px 0; text-align: center;">
            <strong style="color: #fb7185;">🔒 1 Instance = 1 Profiles Domain = 1 Cases Domain = 1 Q Domain</strong>
          </div>
          <ul style="margin-left: 20px; font-size: 13px; line-height: 1.8; color: #94a3b8;">
            <li><strong>Customer Profiles:</strong> All tenant PII pools into one domain</li>
            <li><strong>Amazon Connect Cases:</strong> All case templates, fields, layouts shared</li>
            <li><strong>Amazon Q:</strong> One knowledge base feeds all agents</li>
          </ul>
        `;
      }
      
      createSlide5() {
        return `
          <div class="text-center mb-large">
            <div class="badge danger">Failure Modes</div>
            <h2>Where <span class="danger">Isolation Fails</span></h2>
          </div>
          <div class="grid">
            <div class="card danger" style="border-color: rgba(255, 59, 92, 0.3);">
              <div class="card-title danger">Security Profile Override</div>
              <div class="card-desc">Any admin with unrestricted profile bypasses all TBAC.</div>
            </div>
            <div class="card warn" style="border-color: rgba(255, 176, 32, 0.3);">
              <div class="card-title warn">Contact Search Leakage</div>
              <div class="card-desc">Contact Search returns cross-tenant results.</div>
            </div>
            <div class="card warn" style="border-color: rgba(255, 176, 32, 0.3);">
              <div class="card-title warn">S3 Race Condition</div>
              <div class="card-desc">Lambda must move recordings instantly or data exposed.</div>
            </div>
            <div class="card" style="border-color: rgba(0, 212, 255, 0.3);">
              <div class="card-title">Kinesis / CloudWatch</div>
              <div class="card-desc">CTRs into shared Kinesis. No tag-based filtering.</div>
            </div>
          </div>
        `;
      }
      
      createSlide6() {
        return `
          <div class="text-center mb-large">
            <div class="badge warn">Cost Architecture</div>
            <h2>The <span class="warn">Unlimited AI Trap</span></h2>
            <p class="sub">Instance-level binary toggle with no per-tenant granularity</p>
          </div>
          <div class="grid">
            <div class="card success">
              <div class="card-title success">✅ AI Enabled</div>
              <div style="font-size: 18px; font-weight: 800; color: #e2e8f0; margin: 8px 0;">$0.038<span style="font-size: 12px; color: #94a3b8;"> /min</span></div>
              <div class="card-desc"><strong>Problem:</strong> ALL tenants pay — even those not using AI</div>
            </div>
            <div class="card danger">
              <div class="card-title danger">❌ AI Disabled</div>
              <div style="font-size: 18px; font-weight: 800; color: #e2e8f0; margin: 8px 0;">$0.018<span style="font-size: 12px; color: #94a3b8;"> /min</span></div>
              <div class="card-desc"><strong>Problem:</strong> NO tenants get AI — even those that need it</div>
            </div>
          </div>
          <p style="text-align: center; margin-top: 20px; font-size: 13px;"><strong>The Problem:</strong> NHS needs Contact Lens for safeguarding. DWP refuses the higher rate. Neither gets what they need.</p>
        `;
      }
      
      createSlide7() {
        return `
          <div class="text-center mb-large">
            <div class="badge warn">Technical Solution Path</div>
            <h2>If You Must <span class="warn">Share an Instance</span></h2>
            <p class="sub">Every mitigation, its coverage, and what it leaves exposed</p>
          </div>
          <div class="card success" style="margin-bottom: 12px;">
            <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 8px;"><span style="background: rgba(0, 230, 138, 0.2); color: #00e68a; padding: 2px 8px; border-radius: 4px; font-size: 9px; font-weight: 700;">WORKS</span><strong>Bootstrap Flows + DynamoDB Config</strong></div>
            <div class="card-desc">Addresses routing only. No data isolation.</div>
          </div>
          <div class="card warn" style="border-color: rgba(255, 176, 32, 0.3); margin-bottom: 12px;">
            <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 8px;"><span style="background: rgba(255, 176, 32, 0.2); color: #ffb020; padding: 2px 8px; border-radius: 4px; font-size: 9px; font-weight: 700;">PARTIAL</span><strong>TBAC on Agents & Queues</strong></div>
            <div class="card-desc">Does NOT cover Contacts, S3, Kinesis, CloudWatch, Profiles, or Cases.</div>
          </div>
          <div class="card warn" style="border-color: rgba(255, 176, 32, 0.3);">
            <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 8px;"><span style="background: rgba(255, 176, 32, 0.2); color: #ffb020; padding: 2px 8px; border-radius: 4px; font-size: 9px; font-weight: 700;">PARTIAL</span><strong>KMS + S3 Lambda Pipeline</strong></div>
            <div class="card-desc">Race condition: data in shared bucket until Lambda completes.</div>
          </div>
        `;
      }
      
      createSlide8() {
        return `
          <div class="text-center mb-large">
            <div class="badge warn">Business Decision</div>
            <h2>Should We <span class="warn">Share an Instance?</span></h2>
            <p class="sub">A balanced view for business owners to weigh operational efficiency against risk</p>
          </div>
          <div style="background: rgba(0, 230, 138, 0.04); border: 1px solid rgba(0, 230, 138, 0.2); border-radius: 12px; padding: 14px; margin: 14px 0;">
            <div style="font-weight: 700; color: #00e68a; margin-bottom: 8px;">👍 Arguments FOR</div>
            Lower initial setup · Shared agent pool · Centralized operations · Reusable flow library
          </div>
          <div style="background: rgba(255, 59, 92, 0.04); border: 1px solid rgba(255, 59, 92, 0.2); border-radius: 12px; padding: 14px; margin: 14px 0;">
            <div style="font-weight: 700; color: #ff3b5c; margin-bottom: 8px;">👎 Arguments AGAINST (Critical)</div>
            UK GDPR liability · FOIA cross-contamination · NCSC non-compliance · Blocked AI adoption · Domain lock-in · Security profile single point of failure
          </div>
          <div style="background: rgba(167, 139, 250, 0.04); border: 1px solid rgba(167, 139, 250, 0.2); border-radius: 12px; padding: 14px; text-align: center;">
            <strong style="color: #a78bfa;">Do 5 operational conveniences outweigh 10 risks — including 4 rated CRITICAL under enforceable UK law?</strong>
          </div>
        `;
      }
      
      createSlide9() {
        return `
          <div class="text-center mb-large">
            <div class="badge warn">Frequently Asked Questions</div>
            <h2>Questions & <span class="warn">Answers</span></h2>
            <p class="sub">All answers include citations with links to authoritative sources</p>
          </div>
          <div class="card warn" style="border-color: rgba(255, 176, 32, 0.3); margin-bottom: 12px;">
            <div class="card-title warn">Q: Doesn't TBAC solve isolation?</div>
            <div class="card-desc">TBAC controls access to agents, queues, and profiles — but Contacts cannot be tagged. Contact Lens, Kinesis, S3, and CloudWatch have no TBAC support. TBAC is a visibility filter, not a data-layer boundary.</div>
          </div>
          <div class="card success" style="border-color: rgba(0, 230, 138, 0.3); margin-bottom: 12px;">
            <div class="card-title success">Q: Is there a per-instance fee?</div>
            <div class="card-desc">No. Amazon Connect pricing is purely consumption-based. Running four instances at 25% volume each costs the same as one instance at 100% volume.</div>
          </div>
          <div class="card" style="border-color: rgba(0, 212, 255, 0.3);">
            <div class="card-title">Q: Can Profiles be isolated per tenant?</div>
            <div class="card-desc">No. Each instance can only have one Profiles domain. Identity Resolution merges profiles that look similar across tenants.</div>
          </div>
        `;
      }
      
      createSlide10() {
        return `
          <div class="text-center mb-large">
            <div class="badge success">Recommended Architecture</div>
            <h2>Per-Agency <span class="success">Instances</span></h2>
            <p class="sub">Separate AWS accounts per entity — same cost, hard boundaries, independent domains</p>
          </div>
          <div style="grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); display: grid; gap: 10px; margin: 20px 0;">
            <div class="card" style="border: 1px solid rgba(0, 212, 255, 0.3); background: rgba(0, 212, 255, 0.04);">
              <div class="card-title">💰 Same Cost</div>
              <div class="card-desc">Consumption pricing, no per-instance fee</div>
            </div>
            <div class="card danger" style="border: 1px solid rgba(251, 113, 133, 0.3); background: rgba(251, 113, 133, 0.04);">
              <div class="card-title danger">🔐 Separate Domains</div>
              <div class="card-desc">Profiles, Cases, Q — each agency owns data</div>
            </div>
            <div class="card" style="border: 1px solid rgba(0, 212, 255, 0.3); background: rgba(0, 212, 255, 0.04);">
              <div class="card-title">🧠 Full AI Freedom</div>
              <div class="card-desc">Each agency enables AI independently</div>
            </div>
            <div class="card" style="border: 1px solid rgba(0, 212, 255, 0.3); background: rgba(0, 212, 255, 0.04);">
              <div class="card-title">👁️ Native Supervision</div>
              <div class="card-desc">Silent monitor, barge, whisper — native</div>
            </div>
          </div>
          <div style="background: rgba(0, 230, 138, 0.04); border: 1px solid rgba(0, 230, 138, 0.2); border-radius: 12px; padding: 14px; text-align: center;">
            <strong style="color: #00e68a;">AWS Organization — Shared billing, monitoring, IaC templates, deployment automation</strong>
          </div>
        `;
      }
    }
    
    // Initialize when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => {
        new PresentationApp();
      });
    } else {
      new PresentationApp();
    }
  </script>
</body>
</html>
