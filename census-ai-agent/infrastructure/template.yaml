AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Census Survey AI Agent Infrastructure

Parameters:
  ConnectInstanceId:
    Type: String
    Description: Amazon Connect Instance ID
    Default: 3b3a1349-4cff-40f4-aed7-b19e2e1644b2
  
  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]

Globals:
  Function:
    Timeout: 30
    Runtime: python3.11
    MemorySize: 256
    Environment:
      Variables:
        SURVEYS_TABLE: !Ref SurveysTable
        S3_BUCKET: !Ref SurveysBucket
        MODEL_ID: anthropic.claude-3-haiku-20240307-v1:0

Resources:
  # DynamoDB Table for Survey Storage
  SurveysTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub CensusSurveys-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: survey_id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: survey_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: status-created-index
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      Tags:
        - Key: Project
          Value: CensusAIAgent

  # S3 Bucket for Survey Results (Vector Store Source)
  SurveysBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub census-survey-results-${AWS::AccountId}-${AWS::Region}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT, POST]
            AllowedOrigins: ['*']
            MaxAge: 3600
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Project
          Value: CensusAIAgent

  # Census Survey Lambda Function
  CensusSurveyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub CensusSurveyAgent-${Environment}
      Handler: census_survey.lambda_handler
      CodeUri: ./lambda/
      Description: Census Survey AI Agent for Amazon Connect
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SurveysTable
        - S3CrudPolicy:
            BucketName: !Ref SurveysBucket
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: 
                - !Sub arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-3-haiku-20240307-v1:0
                - !Sub arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-3-sonnet-20240229-v1:0
      Tags:
        Project: CensusAIAgent

  # Permission for Connect to invoke Lambda
  ConnectLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CensusSurveyFunction
      Action: lambda:InvokeFunction
      Principal: connect.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !Sub arn:aws:connect:${AWS::Region}:${AWS::AccountId}:instance/${ConnectInstanceId}

  # Permission for Lex to invoke Lambda
  LexLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CensusSurveyFunction
      Action: lambda:InvokeFunction
      Principal: lexv2.amazonaws.com
      SourceAccount: !Ref AWS::AccountId

  # API Gateway for UI Backend
  SurveyApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub CensusSurveyApi-${Environment}
      StageName: !Ref Environment
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
      Auth:
        DefaultAuthorizer: NONE

  # API Lambda for Survey Results
  SurveyApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub CensusSurveyApi-${Environment}
      Handler: api_handler.lambda_handler
      CodeUri: ./lambda/
      Description: API for Census Survey Results UI
      Events:
        ListSurveys:
          Type: Api
          Properties:
            RestApiId: !Ref SurveyApi
            Path: /surveys
            Method: GET
        GetSurvey:
          Type: Api
          Properties:
            RestApiId: !Ref SurveyApi
            Path: /surveys/{survey_id}
            Method: GET
        SearchSurveys:
          Type: Api
          Properties:
            RestApiId: !Ref SurveyApi
            Path: /search
            Method: POST
        GetStats:
          Type: Api
          Properties:
            RestApiId: !Ref SurveyApi
            Path: /stats
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SurveysTable
        - S3ReadPolicy:
            BucketName: !Ref SurveysBucket
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock-agent-runtime:Retrieve
              Resource: '*'
      Tags:
        Project: CensusAIAgent

  # S3 Bucket for UI Static Files
  UIBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub census-survey-ui-${AWS::AccountId}-${AWS::Region}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET]
            AllowedOrigins: ['*']
      Tags:
        - Key: Project
          Value: CensusAIAgent

  UIBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref UIBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${UIBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}

  # CloudFront Origin Access Control
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub CensusSurveyUI-OAC-${Environment}
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # CloudFront Distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        HttpVersion: http2
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt UIBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ''
          - Id: ApiOrigin
            DomainName: !Sub ${SurveyApi}.execute-api.${AWS::Region}.amazonaws.com
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          Compress: true
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [GET, HEAD]
            ForwardedValues:
              QueryString: true
              Headers:
                - Authorization
                - Content-Type
              Cookies:
                Forward: none
            DefaultTTL: 0
            MinTTL: 0
            MaxTTL: 0
        CustomErrorResponses:
          - ErrorCode: 403
            ResponsePagePath: /index.html
            ResponseCode: 200
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponsePagePath: /index.html
            ResponseCode: 200
            ErrorCachingMinTTL: 0
        PriceClass: PriceClass_100
      Tags:
        - Key: Project
          Value: CensusAIAgent

Outputs:
  SurveysTableName:
    Description: DynamoDB Table for Surveys
    Value: !Ref SurveysTable
    Export:
      Name: !Sub ${AWS::StackName}-SurveysTable

  SurveysBucketName:
    Description: S3 Bucket for Survey Results
    Value: !Ref SurveysBucket
    Export:
      Name: !Sub ${AWS::StackName}-SurveysBucket

  CensusSurveyFunctionArn:
    Description: Census Survey Lambda ARN
    Value: !GetAtt CensusSurveyFunction.Arn
    Export:
      Name: !Sub ${AWS::StackName}-CensusSurveyFunctionArn

  ApiEndpoint:
    Description: API Gateway Endpoint
    Value: !Sub https://${SurveyApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}
    Export:
      Name: !Sub ${AWS::StackName}-ApiEndpoint

  CloudFrontDomain:
    Description: CloudFront Distribution Domain
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Sub ${AWS::StackName}-CloudFrontDomain

  UIBucketName:
    Description: S3 Bucket for UI
    Value: !Ref UIBucket
    Export:
      Name: !Sub ${AWS::StackName}-UIBucket
