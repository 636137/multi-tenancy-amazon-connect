<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Census Survey Results Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 24px; font-weight: 600; }
        .header p { color: #94a3b8; margin-top: 5px; }
        .phone-number { 
            background: #4ade80; 
            color: #000; 
            padding: 10px 20px; 
            border-radius: 8px; 
            font-weight: 600;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 30px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-card h3 { color: #94a3b8; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card .value { font-size: 36px; font-weight: 700; margin: 10px 0; }
        .stat-card.complete .value { color: #4ade80; }
        .stat-card.partial .value { color: #fbbf24; }
        .search-box {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .search-box input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 16px;
        }
        .search-box input::placeholder { color: #94a3b8; }
        .search-box input:focus { outline: none; border-color: #4ade80; }
        .results-table {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        table { width: 100%; border-collapse: collapse; }
        th { 
            text-align: left; 
            padding: 15px 20px; 
            background: rgba(255,255,255,0.05);
            color: #94a3b8;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        td { padding: 15px 20px; border-top: 1px solid rgba(255,255,255,0.05); }
        tr:hover { background: rgba(255,255,255,0.03); }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-complete { background: rgba(74, 222, 128, 0.2); color: #4ade80; }
        .status-partial { background: rgba(251, 191, 36, 0.2); color: #fbbf24; }
        .loading { text-align: center; padding: 40px; color: #94a3b8; }
        .refresh-btn {
            background: #4ade80;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-left: 10px;
        }
        .refresh-btn:hover { background: #22c55e; }
        .answer-cell { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .expand-row { cursor: pointer; }
        .detail-row { display: none; background: rgba(0,0,0,0.2); }
        .detail-row.show { display: table-row; }
        .detail-content { padding: 20px; }
        .detail-content h4 { margin-bottom: 15px; color: #4ade80; }
        .answer-item { margin-bottom: 10px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; }
        .answer-item strong { color: #94a3b8; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>🏛️ Census Survey Results Dashboard</h1>
            <p>Real-time survey responses from the AI-powered Census Agent</p>
        </div>
        <div class="phone-number">📞 +1 (844) 593-5770</div>
    </div>
    
    <div class="container">
        <div class="stats-grid">
            <div class="stat-card complete">
                <h3>Completed Surveys</h3>
                <div class="value" id="completedCount">-</div>
            </div>
            <div class="stat-card partial">
                <h3>In Progress</h3>
                <div class="value" id="partialCount">-</div>
            </div>
            <div class="stat-card">
                <h3>Avg Household Size</h3>
                <div class="value" id="avgHousehold">-</div>
            </div>
            <div class="stat-card">
                <h3>Total Responses</h3>
                <div class="value" id="totalResponses">-</div>
            </div>
        </div>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search surveys by answer content (e.g., 'apartment', '3 bedrooms', 'rent')...">
            <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
        </div>
        
        <div class="results-table">
            <table>
                <thead>
                    <tr>
                        <th>Contact ID</th>
                        <th>Status</th>
                        <th>Household</th>
                        <th>Housing</th>
                        <th>Ownership</th>
                        <th>Bedrooms</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody id="resultsBody">
                    <tr><td colspan="7" class="loading">Loading survey data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = 'https://iucbv74c27.execute-api.us-west-2.amazonaws.com/prod';
        let allSurveys = [];
        
        async function loadData() {
            try {
                const response = await fetch(`${API_URL}/surveys`);
                const data = await response.json();
                allSurveys = data.surveys || [];
                updateStats(allSurveys);
                renderTable(allSurveys);
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('resultsBody').innerHTML = 
                    '<tr><td colspan="7" class="loading">Error loading data. API may not be deployed yet.</td></tr>';
                // Load mock data for demo
                loadMockData();
            }
        }
        
        function loadMockData() {
            // Mock data for demo
            allSurveys = [
                { contact_id: 'demo-001', complete: true, turn: 6, answers: [{answer: '4'}, {answer: '45, 42, 18, 12'}, {answer: 'single family house'}, {answer: 'own'}, {answer: '4'}], updated: new Date().toISOString() },
                { contact_id: 'demo-002', complete: true, turn: 6, answers: [{answer: '2'}, {answer: '35 and 33'}, {answer: 'apartment'}, {answer: 'rent'}, {answer: '2'}], updated: new Date().toISOString() },
                { contact_id: 'demo-003', complete: false, turn: 3, answers: [{answer: '1'}, {answer: '67'}], updated: new Date().toISOString() },
            ];
            updateStats(allSurveys);
            renderTable(allSurveys);
        }
        
        function updateStats(surveys) {
            const completed = surveys.filter(s => s.complete).length;
            const partial = surveys.filter(s => !s.complete).length;
            
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('partialCount').textContent = partial;
            document.getElementById('totalResponses').textContent = surveys.length;
            
            // Calculate avg household
            const householdCounts = surveys
                .filter(s => s.answers && s.answers[0])
                .map(s => parseInt(s.answers[0].answer) || 0)
                .filter(n => n > 0);
            const avg = householdCounts.length > 0 
                ? (householdCounts.reduce((a,b) => a+b, 0) / householdCounts.length).toFixed(1)
                : '-';
            document.getElementById('avgHousehold').textContent = avg;
        }
        
        function renderTable(surveys) {
            const tbody = document.getElementById('resultsBody');
            
            if (surveys.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="loading">No surveys yet. Call +1 (844) 593-5770 to start!</td></tr>';
                return;
            }
            
            tbody.innerHTML = surveys.map((s, idx) => {
                const answers = s.answers || [];
                const household = answers[0]?.answer || '-';
                const housing = answers[2]?.answer || '-';
                const ownership = answers[3]?.answer || '-';
                const bedrooms = answers[4]?.answer || '-';
                const status = s.complete ? 'complete' : 'partial';
                const time = s.updated ? new Date(s.updated).toLocaleString() : '-';
                
                return `
                    <tr class="expand-row" onclick="toggleDetail(${idx})">
                        <td>${s.contact_id?.substring(0, 12) || 'Unknown'}...</td>
                        <td><span class="status-badge status-${status}">${s.complete ? 'Complete' : 'Partial'}</span></td>
                        <td>${household}</td>
                        <td class="answer-cell">${housing}</td>
                        <td>${ownership}</td>
                        <td>${bedrooms}</td>
                        <td>${time}</td>
                    </tr>
                    <tr class="detail-row" id="detail-${idx}">
                        <td colspan="7">
                            <div class="detail-content">
                                <h4>Full Survey Responses</h4>
                                ${answers.map((a, i) => `
                                    <div class="answer-item">
                                        <strong>Q${i + 1}:</strong> ${a.q_text || getQuestionText(i)}<br>
                                        <strong>A:</strong> ${a.answer}
                                    </div>
                                `).join('')}
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }
        
        function getQuestionText(idx) {
            const questions = [
                'How many people live at this address?',
                'What are the ages of each person?',
                'Type of housing?',
                'Own or rent?',
                'Number of bedrooms?'
            ];
            return questions[idx] || `Question ${idx + 1}`;
        }
        
        function toggleDetail(idx) {
            const row = document.getElementById(`detail-${idx}`);
            row.classList.toggle('show');
        }
        
        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            if (!query) {
                renderTable(allSurveys);
                return;
            }
            const filtered = allSurveys.filter(s => {
                const answers = (s.answers || []).map(a => a.answer?.toLowerCase() || '').join(' ');
                return answers.includes(query);
            });
            renderTable(filtered);
        });
        
        // Load data on page load
        loadData();
        
        // Auto-refresh every 30 seconds
        setInterval(loadData, 30000);
    </script>
</body>
</html>
