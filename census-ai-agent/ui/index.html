<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Census Survey Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%); }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="gradient-bg text-white py-6 px-8 shadow-lg">
        <div class="max-w-7xl mx-auto">
            <h1 class="text-3xl font-bold">Census Survey Dashboard</h1>
            <p class="text-blue-200 mt-1">American Community Survey Results</p>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-8 py-6">
        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="card p-4">
                <div class="text-gray-500 text-sm">Total Surveys</div>
                <div id="totalSurveys" class="text-3xl font-bold text-blue-600">-</div>
            </div>
            <div class="card p-4">
                <div class="text-gray-500 text-sm">Completed</div>
                <div id="completedSurveys" class="text-3xl font-bold text-green-600">-</div>
            </div>
            <div class="card p-4">
                <div class="text-gray-500 text-sm">Avg Household Size</div>
                <div id="avgHousehold" class="text-3xl font-bold text-purple-600">-</div>
            </div>
            <div class="card p-4">
                <div class="text-gray-500 text-sm">Today's Surveys</div>
                <div id="todaySurveys" class="text-3xl font-bold text-orange-600">-</div>
            </div>
        </div>

        <!-- Search and Filters -->
        <div class="card p-4 mb-6">
            <div class="flex flex-wrap gap-4 items-center">
                <input type="text" id="searchInput" placeholder="Search by ZIP, employment status..." 
                       class="flex-1 min-w-64 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                <select id="statusFilter" class="px-4 py-2 border border-gray-300 rounded-lg">
                    <option value="">All Status</option>
                    <option value="completed">Completed</option>
                    <option value="partial">Partial</option>
                </select>
                <button onclick="searchSurveys()" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                    Search
                </button>
                <button onclick="loadSurveys()" class="px-6 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700">
                    Refresh
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Survey List -->
            <div class="lg:col-span-2 card p-4">
                <h2 class="text-xl font-semibold mb-4">Recent Surveys</h2>
                <div id="surveyList" class="space-y-3 max-h-96 overflow-y-auto">
                    <p class="text-gray-500">Loading surveys...</p>
                </div>
            </div>

            <!-- Charts -->
            <div class="card p-4">
                <h2 class="text-xl font-semibold mb-4">Employment Status</h2>
                <canvas id="employmentChart" height="200"></canvas>
            </div>
        </div>

        <!-- Survey Details Modal -->
        <div id="surveyModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
            <div class="card max-w-lg w-full mx-4 p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-semibold">Survey Details</h3>
                    <button onclick="closeModal()" class="text-gray-500 hover:text-gray-700">&times;</button>
                </div>
                <div id="modalContent"></div>
            </div>
        </div>
    </div>

    <script>
        // API Configuration - Update this URL after deploying API Gateway
        const API_BASE = 'https://19zbg0z8ag.execute-api.us-west-2.amazonaws.com/prod';
        
        // For local testing with DynamoDB direct access
        const USE_LOCAL = false;
        
        let surveys = [];
        let employmentChart = null;

        async function loadSurveys() {
            if (USE_LOCAL) {
                // Mock data for demo
                surveys = [
                    {
                        surveyId: 'demo-001',
                        timestamp: new Date().toISOString(),
                        status: 'completed',
                        responses: {
                            HouseholdCount: '4',
                            OwnershipStatus: 'own',
                            ZipCode: '98101',
                            Age: '42',
                            EmploymentStatus: 'employed'
                        }
                    },
                    {
                        surveyId: 'demo-002',
                        timestamp: new Date(Date.now() - 86400000).toISOString(),
                        status: 'completed',
                        responses: {
                            HouseholdCount: '2',
                            OwnershipStatus: 'rent',
                            ZipCode: '90210',
                            Age: '28',
                            EmploymentStatus: 'employed'
                        }
                    },
                    {
                        surveyId: 'demo-003',
                        timestamp: new Date(Date.now() - 172800000).toISOString(),
                        status: 'completed',
                        responses: {
                            HouseholdCount: '1',
                            OwnershipStatus: 'rent',
                            ZipCode: '10001',
                            Age: '65',
                            EmploymentStatus: 'retired'
                        }
                    }
                ];
                renderSurveys();
                updateStats();
                renderChart();
            } else {
                try {
                    const response = await fetch(`${API_BASE}/surveys`);
                    surveys = await response.json();
                    renderSurveys();
                    updateStats();
                    renderChart();
                } catch (error) {
                    console.error('Error loading surveys:', error);
                    document.getElementById('surveyList').innerHTML = '<p class="text-red-500">Error loading surveys</p>';
                }
            }
        }

        function renderSurveys() {
            const container = document.getElementById('surveyList');
            if (surveys.length === 0) {
                container.innerHTML = '<p class="text-gray-500">No surveys found</p>';
                return;
            }
            
            container.innerHTML = surveys.map(s => `
                <div class="border rounded-lg p-3 hover:bg-gray-50 cursor-pointer" onclick="showDetails('${s.surveyId}')">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="font-medium">${s.responses?.ZipCode || 'Unknown'}</span>
                            <span class="text-gray-500 text-sm ml-2">${s.responses?.HouseholdCount || '?'} people</span>
                        </div>
                        <span class="text-xs px-2 py-1 rounded ${s.status === 'completed' ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'}">
                            ${s.status}
                        </span>
                    </div>
                    <div class="text-sm text-gray-500 mt-1">
                        ${new Date(s.timestamp).toLocaleString()}
                    </div>
                </div>
            `).join('');
        }

        function updateStats() {
            document.getElementById('totalSurveys').textContent = surveys.length;
            document.getElementById('completedSurveys').textContent = surveys.filter(s => s.status === 'completed').length;
            
            const households = surveys.map(s => parseInt(s.responses?.HouseholdCount) || 0).filter(h => h > 0);
            const avgHousehold = households.length ? (households.reduce((a,b) => a+b, 0) / households.length).toFixed(1) : '-';
            document.getElementById('avgHousehold').textContent = avgHousehold;
            
            const today = new Date().toDateString();
            const todayCount = surveys.filter(s => new Date(s.timestamp).toDateString() === today).length;
            document.getElementById('todaySurveys').textContent = todayCount;
        }

        function renderChart() {
            const ctx = document.getElementById('employmentChart').getContext('2d');
            
            const employment = {};
            surveys.forEach(s => {
                const status = s.responses?.EmploymentStatus || 'Unknown';
                employment[status] = (employment[status] || 0) + 1;
            });
            
            if (employmentChart) employmentChart.destroy();
            
            employmentChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(employment),
                    datasets: [{
                        data: Object.values(employment),
                        backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6']
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { position: 'bottom' } }
                }
            });
        }

        function showDetails(id) {
            const survey = surveys.find(s => s.surveyId === id);
            if (!survey) return;
            
            document.getElementById('modalContent').innerHTML = `
                <div class="space-y-3">
                    <div><strong>Survey ID:</strong> ${survey.surveyId}</div>
                    <div><strong>Date:</strong> ${new Date(survey.timestamp).toLocaleString()}</div>
                    <div><strong>Status:</strong> ${survey.status}</div>
                    <hr class="my-3">
                    <h4 class="font-semibold">Responses:</h4>
                    ${Object.entries(survey.responses || {}).map(([k,v]) => 
                        `<div class="flex justify-between"><span class="text-gray-600">${k}:</span><span>${v}</span></div>`
                    ).join('')}
                </div>
            `;
            document.getElementById('surveyModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('surveyModal').classList.add('hidden');
        }

        function searchSurveys() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const status = document.getElementById('statusFilter').value;
            
            const filtered = surveys.filter(s => {
                const matchesQuery = !query || 
                    Object.values(s.responses || {}).some(v => v.toString().toLowerCase().includes(query));
                const matchesStatus = !status || s.status === status;
                return matchesQuery && matchesStatus;
            });
            
            // Temporarily replace surveys for rendering
            const originalSurveys = surveys;
            surveys = filtered;
            renderSurveys();
            surveys = originalSurveys;
        }

        // Initialize
        loadSurveys();
    </script>
</body>
</html>
